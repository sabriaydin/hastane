<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hastane Portal</title>
  
  <base href="https://sabriaydin.github.io/hastane/"> 
  
  <link rel="stylesheet" href="style.css">
  <script src="auth-check.js"></script>
</head>
<body class="dashboard-body">

  <div id="header-placeholder"></div>

  <main class="dashboard-container">
    <section class="panel">
      <div class="panel-header">Günlük Nöbet Listesi Oluştur</div>
      <div class="panel-body">
        <center><style>
    /* Tasarım kodlarının siteye taşmasını engellemek için tüm özelliklerin başına #nobet-cizelgesi-kapsayici eklendi */
    #nobet-cizelgesi-kapsayici { font-family: sans-serif; max-width: 450px; margin: 20px auto; color: #222; line-height: 1.2; padding: 0 10px; box-sizing: border-box; text-align: left; }
    #nobet-cizelgesi-kapsayici .section { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
    #nobet-cizelgesi-kapsayici .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    #nobet-cizelgesi-kapsayici label { font-size: 13px; font-weight: bold; color: #555; display: inline-block; margin: 0; padding: 0; }
    #nobet-cizelgesi-kapsayici .row { display: flex; gap: 5px; margin-bottom: 5px; align-items: flex-end; }
    #nobet-cizelgesi-kapsayici .col { display: flex; flex-direction: column; gap: 2px; flex-grow: 1; }
    #nobet-cizelgesi-kapsayici .col-sm { flex-grow: 0; width: 85px; }
    #nobet-cizelgesi-kapsayici .col-label { font-size: 10px; color: #888; font-weight: bold; text-transform: uppercase; }
    #nobet-cizelgesi-kapsayici select, #nobet-cizelgesi-kapsayici input { padding: 6px; border: 1px solid #ccc; border-radius: 3px; font-size: 14px; width: 100%; box-sizing: border-box; background-color: #fff; color: #222; height: 31px; margin: 0; }
    #nobet-cizelgesi-kapsayici select:disabled { background-color: #f5f5f5; cursor: not-allowed; }
    #nobet-cizelgesi-kapsayici button { cursor: pointer; border: 1px solid #ccc; background: #fff; border-radius: 3px; padding: 6px 10px; font-size: 12px; height: 31px; margin: 0; box-sizing: border-box; display: inline-block; }
    #nobet-cizelgesi-kapsayici .btn-add { color: #28a745; border-color: #28a745; padding: 2px 8px; height: auto; }
    #nobet-cizelgesi-kapsayici .btn-add:disabled { opacity: 0.3; cursor: not-allowed; }
    #nobet-cizelgesi-kapsayici .btn-del { color: #dc3545; border-color: #dc3545; }
    #nobet-cizelgesi-kapsayici #cikti-alani { margin-top: 25px; }
    #nobet-cizelgesi-kapsayici #cikti { padding: 15px; border: 1px solid #ddd; background: #fdfdfd; white-space: pre-wrap; font-size: 14px; min-height: 50px; margin: 0; }
    #nobet-cizelgesi-kapsayici #btn-kopya { width: 100%; margin-top: 10px; padding: 10px; background: #222; color: #fff; border: none; font-weight: bold; cursor: pointer; height: auto; }
    #nobet-cizelgesi-kapsayici #btn-kopya:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; }
    #nobet-cizelgesi-kapsayici #btn-reset { width: 100%; margin-top: 8px; padding: 8px; background: transparent; color: #dc3545; border: 1px solid #dc3545; font-size: 12px; cursor: pointer; border-radius: 3px; height: auto; }
    #nobet-cizelgesi-kapsayici #btn-reset:hover { background: #fff5f5; }
    
    #nobet-cizelgesi-kapsayici #toast {
        visibility: hidden; min-width: 200px; background-color: #333; color: #fff;
        text-align: center; border-radius: 25px; padding: 12px;
        position: fixed; z-index: 9999; left: 50%; bottom: 30px;
        transform: translateX(-50%); font-size: 14px; opacity: 0;
        transition: opacity 0.4s, visibility 0.4s; margin: 0;
    }
    #nobet-cizelgesi-kapsayici #toast.show { visibility: visible; opacity: 1; }
</style>

<div id="nobet-cizelgesi-kapsayici">

    <div class="section">
        <label>Tarih</label>
        <input type="date" id="tarih" oninput="listeGuncelle()">
    </div>

    <div id="alanlar"></div>

    <div id="cikti-alani">
        <div id="cikti">Lütfen tarih ve kişi seçiniz.</div>
        <button id="btn-kopya" onclick="kopyala()" disabled>Metni Kopyala</button>
        <button id="btn-reset" onclick="temizle()">Tüm Listeyi Temizle</button>
    </div>

    <div id="toast">Liste panoya kopyalandı</div>

</div>

<script>
const PERSONEL = {
    "Doktor": ["Selinnur Bekdemir", "Büşra Sıbıç", "Havva Nur Eyüpoğlu", "Ahmet Köse", "Kamil Okan Tuna", "Ali Karakaya", "Taha Yasin Kaya"],
    "Hemşire": ["Abdullah", "Nurcan", "Birgül", "Leyla", "Zuhal", "Sude", "Ayçe İdil", "Sevda", "Huri", "Nevin", "Servet"],
    "Sekreter": ["Melek", "Sabri", "Enes", "İsmail", "Fatma"],
    "Röntgen": ["Hüseyin", "Alperen", "Ömer Faruk", "Ahmet Samet", "Ayşe Nur"],
    "Laboratuvar": ["Leyla", "Nevin", "Sevda", "Kadın", "Zeynep"],
    "Personel": ["Sinan", "Enes", "Ali", "Zeynep", "Mülkinaz", "İsmail", "Nermin", "Şenay", "Emine", "Recep"],
    "Güvenlik": ["Uğur Aslan", "Uğur Patan", "Emrah", "Birol", "Talip", "İsa", "Erdal", "Özlem"]
};

const SINIR = 5;

function bugunuAyarla() {
    const dateInput = document.getElementById('tarih');
    const today = new Date();
    const yyyy = today.getFullYear();
    let mm = today.getMonth() + 1;
    let dd = today.getDate();
    if (dd < 10) dd = '0' + dd;
    if (mm < 10) mm = '0' + mm;
    dateInput.value = `${yyyy}-${mm}-${dd}`;
}

function isimSec(selectElem) {
    const parentCol = selectElem.parentElement;
    const manualInput = parentCol.querySelector('.manual-name');
    
    if (selectElem.value === "MANUAL_ENTRY") {
        manualInput.style.display = "block";
        manualInput.focus();
    } else {
        manualInput.style.display = "none";
        manualInput.value = ""; 
    }
    listeGuncelle();
}

function listeGuncelle() {
    const dateVal = document.getElementById('tarih').value;
    const kopyaBtn = document.getElementById('btn-kopya');
    if(!dateVal) {
        kopyaBtn.disabled = true;
        return;
    }
    
    const t = dateVal.split('-');
    let sonuc = `${t[2]}.${t[1]}.${t[0]} Nöbet Listesi\n\n`;
    let veriVarMi = false;

    Object.keys(PERSONEL).forEach(kat => {
        const rows = document.querySelectorAll(`#liste-${kat} .row`);
        let katIsimleri = [];

        rows.forEach(row => {
            const nameSelect = row.querySelector('.name-select');
            const manualInput = row.querySelector('.manual-name');
            let name = nameSelect.value;
            
            if (name === "MANUAL_ENTRY") {
                name = manualInput.value.trim();
            }

            const shiftSelect = row.querySelector('.shift-select');
            
            if (shiftSelect) {
                shiftSelect.disabled = (name === "");
                if(name === "") shiftSelect.value = "-";
            }

            if (name !== "") {
                const shiftText = (shiftSelect && shiftSelect.value !== "-") ? ` (${shiftSelect.value})` : "";
                katIsimleri.push(name + shiftText);
            }
        });
        
        if(katIsimleri.length > 0) {
            sonuc += `${kat}: ${katIsimleri.join(', ')}\n`;
            veriVarMi = true;
        }
    });

    document.getElementById('cikti').innerText = veriVarMi ? sonuc : "Lütfen tarih ve kişi seçiniz.";
    kopyaBtn.disabled = !veriVarMi;
}

function butonKontrol(kat) {
    const adet = document.querySelectorAll(`#liste-${kat} .name-select`).length;
    const btn = document.querySelector(`button[data-add="${kat}"]`);
    if(btn) btn.disabled = (adet >= SINIR);
}

function satirEkle(kat) {
    const liste = document.getElementById(`liste-${kat}`);
    const div = document.createElement('div');
    div.className = 'row';
    
    let nameOptions = `<option value="" selected disabled>Seçiniz...</option>` + 
                     PERSONEL[kat].map(isim => `<option value="${isim}">${isim}</option>`).join('') +
                     `<option value="MANUAL_ENTRY">+ Manuel Ekle...</option>`;
    
    let shiftHtml = "";
    if (kat === "Güvenlik" || kat === "Personel") {
        shiftHtml = `
            <div class="col col-sm">
                <span class="col-label">Vardiya</span>
                <select class="shift-select" onchange="listeGuncelle()" disabled>
                    <option value="-">-</option>
                    <option value="Gündüz">Gündüz</option>
                    <option value="Gece">Gece</option>
                </select>
            </div>`;
    }

    div.innerHTML = `
        <div class="col">
            <span class="col-label">İsim</span>
            <select class="name-select" data-kat="${kat}" onchange="isimSec(this)">${nameOptions}</select>
            <input type="text" class="manual-name" style="display:none; margin-top:3px;" placeholder="İsim yazınız..." oninput="listeGuncelle()">
        </div>
        ${shiftHtml}
        <button class="btn-del" onclick="this.parentElement.remove(); butonKontrol('${kat}'); listeGuncelle()">x</button>
    `;
    liste.appendChild(div);
    butonKontrol(kat);
}

function temizle() {
    if(!confirm("Tüm listeyi temizlemek istediğinize emin misiniz?")) return;
    
    Object.keys(PERSONEL).forEach(kat => {
        const liste = document.getElementById(`liste-${kat}`);
        liste.innerHTML = ""; 
        satirEkle(kat); 
    });
    bugunuAyarla();
    listeGuncelle();
}

bugunuAyarla();
Object.keys(PERSONEL).forEach(kat => {
    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = `
        <div class="head">
            <label>${kat}</label>
            <button class="btn-add" data-add="${kat}" onclick="satirEkle('${kat}')">+ Ekle</button>
        </div>
        <div id="liste-${kat}"></div>
    `;
    document.getElementById('alanlar').appendChild(div);
    satirEkle(kat);
});

function kopyala() {
    const metin = document.getElementById('cikti').innerText;
    navigator.clipboard.writeText(metin).then(() => {
        const toast = document.getElementById("toast");
        toast.className = "show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2000);
    });
}

listeGuncelle();
</script></center>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="script.js"></script>
</body>
</html>
