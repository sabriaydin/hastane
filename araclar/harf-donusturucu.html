<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hastane Portal</title>
  
  <base href="https://sabriaydin.github.io/hastane/"> 
  
  <link rel="stylesheet" href="style.css">
  <script src="auth-check.js"></script>
</head>
<body class="dashboard-body">

  <div id="header-placeholder"></div>

  <main class="dashboard-container">
    <section class="panel">
      <div class="panel-header">Word Uzantılı Belgeler</div>
      <div class="panel-body">
        <style>
    .container {
        font-family: sans-serif;
        max-width: 800px;
        margin: 0 auto;
    }
    .counter-container {
        margin-bottom: 10px;
        font-weight: bold;
    }
    textarea {
        width: 100%;
        height: 250px;
        box-sizing: border-box;
        margin-bottom: 10px;
        resize: none; /* Köşeden tutarak boyutlandırmayı engeller */
    }
    .buttons-container button {
        margin: 0 5px 5px 0;
        padding: 8px 12px;
        cursor: pointer;
    }
</style>

<div class="container">
    <h1>Harf Çevirme Aracı</h1>
    
    <div class="counter-container">
        <span id="wordCount">0 Kelime</span> | 
        <span id="charCount">0 Karakter</span>
    </div>

    <textarea id="textInput" placeholder="Metninizi buraya yazın veya yapıştırın..."></textarea>

    <div class="buttons-container">
        <button onclick="toUpperCase()">BÜYÜK HARF</button>
        <button onclick="toLowerCase()">küçük harf</button>
        <button onclick="reverseText()">ızay sreT</button>
        <button onclick="capitalizeWords()">Kelimelerin Baş Harfi Büyük</button>
        <button onclick="toggleCase()">BÜYÜK/küçük değiştir</button>
        <button class="copy-btn" onclick="copyText()">Metni Kopyala</button>
    </div>
</div>

<script>
    const textInput = document.getElementById('textInput');
    const wordCount = document.getElementById('wordCount');
    const charCount = document.getElementById('charCount');

    textInput.addEventListener('input', updateCounts);

    function updateCounts() {
        const text = textInput.value;
        charCount.textContent = text.length + ' Karakter';
        
        const trimmedText = text.trim();
        if (trimmedText === '') {
            wordCount.textContent = '0 Kelime';
        } else {
            const words = trimmedText.split(/\s+/);
            wordCount.textContent = words.length + ' Kelime';
        }
    }

    function toUpperCase() {
        textInput.value = textInput.value.toLocaleUpperCase('tr-TR');
        updateCounts();
    }

    function toLowerCase() {
        textInput.value = textInput.value.toLocaleLowerCase('tr-TR');
        updateCounts();
    }

    function reverseText() {
        textInput.value = textInput.value.split('').reverse().join('');
        updateCounts();
    }

    function capitalizeWords() {
        textInput.value = textInput.value.replace(/([^\s]+)/g, function(word) {
            return word.charAt(0).toLocaleUpperCase('tr-TR') + word.slice(1).toLocaleLowerCase('tr-TR');
        });
        updateCounts();
    }

    function toggleCase() {
        let result = '';
        const text = textInput.value;
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            let upperChar = char.toLocaleUpperCase('tr-TR');
            let lowerChar = char.toLocaleLowerCase('tr-TR');
            
            if (char === upperChar && char !== lowerChar) {
                result += lowerChar;
            } else if (char === lowerChar && char !== upperChar) {
                result += upperChar;
            } else {
                result += char;
            }
        }
        textInput.value = result;
        updateCounts();
    }

    function copyText() {
        if(textInput.value.length === 0) return;
        textInput.select();
        document.execCommand('copy');
        alert("Metin panoya kopyalandı!");
    }
</script>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="script.js"></script>
</body>
</html>
