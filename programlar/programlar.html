<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hastane Portal</title>
  
  <base href="https://sabriaydin.github.io/hastane/"> 
  
  <link rel="stylesheet" href="style.css">
  <script src="auth-check.js"></script>
</head>
<body class="dashboard-body">

  <div id="header-placeholder"></div>

  <main class="dashboard-container">
    <section class="panel">
      <div class="panel-header">Word Uzantılı Belgeler</div>
      <div class="panel-body">
        <div class="simple-link-container">
  <h3 class="section-title">Arama</h3>
  <input type="text" id="searchInput" placeholder="Bağlantı Ara..." onkeyup="filterLinks()">
  
  <h3 class="section-title list-title">Bağlantılar</h3>
  <ul id="linkList">
    <li><a href="tsim.jnlp" download>Temel Sağlık İstatistikleri Modülü [TSİM]</a></li>
    <li><a href="ckys.jnlp" download>Çekirdek Kaynak Yönetim Sistemi [ÇKYS]</a></li>
    <li><a href="jre-8u341-windows-i586.exe" download>Java (32bit) 8 Update 341</a></li>
  </ul>
</div>

<style>
  .simple-link-container {
    width: 100%;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  .section-title {
    font-size: 13px;
    color: #777;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 600;
    margin: 0 0 10px 0;
  }

  .list-title {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 2px solid #dbdbdb;
  }

  #searchInput {
    width: 100%;
    box-sizing: border-box;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s;
  }

  #searchInput:focus {
    border-color: #999;
  }

  #linkList {
    list-style-type: none;
    padding: 0;
    margin: 0;
    width: 100%;
  }

  #linkList li {
    width: 100%;
  }

  #linkList li a {
    display: block;
    padding: 14px 12px;
    color: #333;
    text-decoration: none;
    border-bottom: 1px solid #eee;
    box-sizing: border-box;
    transition: background-color 0.2s ease, padding-left 0.2s ease;
  }

  #linkList li a:hover {
    background-color: #f9f9f9;
    padding-left: 16px;
  }

  #linkList li:last-child a {
    border-bottom: none;
  }
</style>

<script>
  function filterLinks() {
    const input = document.getElementById('searchInput');
    const filter = input.value.toUpperCase();
    const ul = document.getElementById('linkList');
    const li = ul.getElementsByTagName('li');

    for (let i = 0; i < li.length; i++) {
      let a = li[i].getElementsByTagName('a')[0];
      let txtValue = a.textContent || a.innerText;
      
      if (txtValue.toUpperCase().indexOf(filter) > -1) {
        li[i].style.display = "";
      } else {
        li[i].style.display = "none";
      }
    }
  }
</script>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="script.js"></script>
</body>
</html>
