<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yönetim Portalı</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="login-container" class="wrapper">
    <div class="login-box">
      <h2>Sisteme Giriş</h2>
      <div id="message-box" class="message hidden"></div>
      
      <div class="input-group">
        <input type="text" id="username" placeholder="Kullanıcı Adı" required>
      </div>
      <div class="input-group">
        <input type="password" id="password" placeholder="Parola" required>
      </div>
      
      <div class="checkbox-group">
        <input type="checkbox" id="remember-me">
        <label for="remember-me">Oturumu açık tut</label>
      </div>
      
      <button id="login-btn" onclick="attemptLogin()">Giriş Yap</button>
    </div>
  </div>

  <div id="dashboard-container" class="wrapper hidden">
    <header class="dashboard-header">
      <h2>Yönetim Paneli</h2>
      <button class="logout-btn" onclick="logout()">Sistemden Çık</button>
    </header>
    
    <main class="dashboard-content">
      <div class="welcome-card">
        <h3>Hoş Geldiniz</h3>
        <p>Sistem durumu aktif. Başarılı bir şekilde giriş yaptınız.</p>
        <p>Burası sade, doğrudan ve profesyonel yönetim arayüzünüzdür. İhtiyaç duyduğunuz modülleri ve verileri buraya entegre edebilirsiniz.</p>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
