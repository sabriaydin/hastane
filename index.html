<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Güvenli Portal</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .container { background: #fff; padding: 20px 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
    input[type="text"], input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .checkbox-container { display: flex; align-items: center; margin-bottom: 15px; font-size: 14px; }
    button { background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 5px;}
    button:hover { background-color: #218838; }
    .logout-btn { background-color: #dc3545; margin-top: 20px; }
    .logout-btn:hover { background-color: #c82333; }
    .error-msg { color: red; font-size: 14px; display: none; margin-bottom: 10px; }
    
    /* İçerik ve Sekme Stilleri */
    #dashboard-view { display: none; }
    .tab-container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 15px; justify-content: center;}
    .tab-btn { background-color: #007bff; padding: 8px 12px; font-size: 14px; width: auto; flex-grow: 1; }
    .tab-btn:hover { background-color: #0056b3; }
    .tab-content { background: #e9ecef; padding: 15px; border-radius: 4px; margin-top: 10px; text-align: left; font-size: 14px; }
  </style>
</head>
<body>

  <div id="login-view" class="container">
    <h2>Sisteme Giriş</h2>
    <div id="error-message" class="error-msg">Kullanıcı adı veya parola hatalı!</div>
    <input type="text" id="username" placeholder="Kullanıcı Adı" required>
    <input type="password" id="password" placeholder="Parola" required>
    <div class="checkbox-container">
      <input type="checkbox" id="remember-me">
      <label for="remember-me" style="margin-left: 5px;">Oturumu açık tut (Yeniden başlatıldığında hatırlanır)</label>
    </div>
    <button onclick="login()">Giriş Yap</button>
  </div>

  <div id="dashboard-view" class="container" style="max-width: 600px;">
    <h2>Yönetim Paneli</h2>
    <p>Giriş başarılı! İçerikleriniz aşağıdadır.</p>
    
    <div id="tab-buttons" class="tab-container"></div>
    <div id="tab-contents"></div>

    <button class="logout-btn" onclick="logout()">Sistemden Çıkış Yap</button>
  </div>

  <script>
    // 1. HARİCİ VERİ SİMÜLASYONU VE BASE64
    // Şifrelenmiş (Base64) veriyi tutan sanal dosya oluşturuluyor. 
    // YWRtaW4= (admin), cGFzc3dvcmQxMjM= (password123)
    const sanalVeri = '{"user": "YWRtaW4=", "pass": "cGFzc3dvcmQxMjM="}';
    const blobDosya = new Blob([sanalVeri], { type: 'application/json' });
    const hariciDosyaYolu = URL.createObjectURL(blobDosya);

    // Sayfa açıldığında oturum durumunu ve sekmeleri kontrol et
    window.onload = function() {
      arayuzSekmeleriniOlustur();
      checkSession();
    };

    // 2. OTURUM KONTROLÜ
    function checkSession() {
      const isLoggedIn = localStorage.getItem("isLoggedIn") === "true";
      const isSessionActive = sessionStorage.getItem("isLoggedIn") === "true";
      
      if (isLoggedIn || isSessionActive) {
        showDashboard();
      } else {
        showLogin();
      }
    }

    // 3. GİRİŞ İŞLEMİ (FETCH VE BASE64 KONTROLÜ)
    async function login() {
      const inputUser = document.getElementById("username").value;
      const inputPass = document.getElementById("password").value;
      const rememberMe = document.getElementById("remember-me").checked;
      const errorMsg = document.getElementById("error-message");

      try {
        // Sanal dosyadan (harici kaynak simülasyonu) veriyi çekiyoruz
        const response = await fetch(hariciDosyaYolu);
        const data = await response.json();

        // Yazılan değerleri Base64'e çevirip karşılaştırıyoruz
        const encodedUser = btoa(inputUser);
        const encodedPass = btoa(inputPass);

        if (encodedUser === data.user && encodedPass === data.pass) {
          errorMsg.style.display = "none";
          
          if (rememberMe) {
            localStorage.setItem("isLoggedIn", "true"); // Kalıcı hafıza
          } else {
            sessionStorage.setItem("isLoggedIn", "true"); // Geçici hafıza
          }
          showDashboard();
        } else {
          errorMsg.style.display = "block";
        }
      } catch (error) {
        alert("Bağlantı hatası oluştu.");
      }
    }

    // 4. ÇIKIŞ İŞLEMİ
    function logout() {
      localStorage.removeItem("isLoggedIn");
      sessionStorage.removeItem("isLoggedIn");
      document.getElementById("username").value = "";
      document.getElementById("password").value = "";
      document.getElementById("remember-me").checked = false;
      showLogin();
    }

    // 5. EKRAN GEÇİŞLERİ
    function showDashboard() {
      document.getElementById("login-view").style.display = "none";
      document.getElementById("dashboard-view").style.display = "block";
    }

    function showLogin() {
      document.getElementById("dashboard-view").style.display = "none";
      document.getElementById("login-view").style.display = "block";
    }

    // 6. SEKME OLUŞTURUCU 
    function arayuzSekmeleriniOlustur() {
      let btnHTML = "";
      let contentHTML = "";
      const maksimumSekmeSayisi = 10; // Sekme sayısı en fazla 10 olsun kuralı
      
      for(let i = 1; i <= maksimumSekmeSayisi; i++) {
        btnHTML += `<button class="tab-btn" onclick="sekmeAc(${i})">Sekme ${i}</button>`;
        contentHTML += `<div id="tab${i}" class="tab-content" style="display: ${i === 1 ? 'block' : 'none'};">
                          <strong>Burası ${i}. Sekme İçeriği</strong><br><br>
                          Bu alana kendi metinlerinizi, resimlerinizi veya diğer sistem bileşenlerinizi ekleyebilirsiniz.
                        </div>`;
      }
      
      document.getElementById('tab-buttons').innerHTML = btnHTML;
      document.getElementById('tab-contents').innerHTML = contentHTML;
    }

    function sekmeAc(sekmeNumarasi) {
      // Tüm sekme içeriklerini gizle, sadece tıklananı göster
      for(let i = 1; i <= 10; i++) {
        document.getElementById(`tab${i}`).style.display = "none";
      }
      document.getElementById(`tab${sekmeNumarasi}`).style.display = "block";
    }
  </script>

</body>
</html>
