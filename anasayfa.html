<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Yönetim Merkezi</title>
  <link rel="stylesheet" href="style.css">
  
  <script>
    const isLocal = localStorage.getItem("isLoggedIn") === "true";
    const isSession = sessionStorage.getItem("isLoggedIn") === "true";
    if (!isLocal && !isSession) {
      window.location.replace("index.html");
    }
  </script>
</head>
<body class="dashboard-body">

  <div id="header-placeholder"></div>

  <main class="dashboard-container" style="width: 100%;">
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-title">AKTİF CİHAZ SAYISI</div>
        <div class="stat-value">24</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">AĞ TRAFİĞİ</div>
        <div class="stat-value">1.2 GB/s</div>
      </div>
      <div class="stat-card alert">
        <div class="stat-title">GÜVENLİK UYARILARI</div>
        <div class="stat-value">0</div>
      </div>
    </div>

    <section class="panel">
      <div class="panel-header">CİHAZ KEŞİF MODÜLÜ</div>
      <div class="panel-body">
        <p>Sistem aktif. Yetkilendirme başarılı.</p>
        <p>Ağ cihazlarını ve kameraları tarayan batch betiklerinizin tetikleyici butonlarını, log çıktılarını veya aktif IP tablolarınızı bu alana yerleştirebilirsiniz.</p>
        
        <button class="btn-download" onclick="secureDownload('raporlar.pdf')">GİZLİ RAPORU İNDİR</button>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="script.js"></script>
</body>
</html>
